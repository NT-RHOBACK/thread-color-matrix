name: Suggest a Thread Color Match
description: Propose a new cross-brand thread color equivalency
title: "Suggest match: [COLOR NAME OR NUMBER]"
labels: ["suggestion"]
body:
  - type: markdown
    attributes:
      value: |
        Enter the **thread number** for each brand you know — leave the rest blank.
        Color names, hex codes, and the shade family are all filled in automatically
        from the thread color, so you only need the number(s).

        **Fixing a shade?** If a color is filed under the wrong shade family
        (e.g. a burgundy showing as Purple instead of Red), enter the number(s)
        of that existing match, pick the correct **Color Shade** below, and add
        a quick note. Same form — the numbers don't have to be a *new* match.

  - type: dropdown
    id: shade
    attributes:
      label: Color Shade (family)
      description: Optional. Leave blank for a new match and it's auto-assigned from the thread color. Pick one to override the auto shade, or to correct the shade of an existing match.
      options:
        - Black
        - Blue
        - Brown
        - Gold
        - Green
        - Grey
        - Navy
        - Orange
        - Pink
        - Purple
        - Red
        - Tan
        - White
        - Yellow

  - type: input
    id: polyneon_number
    attributes:
      label: Madeira Polyneon — Number
      placeholder: "e.g. 1704"

  - type: input
    id: classic_number
    attributes:
      label: Madeira Classic — Number
      placeholder: "e.g. 1390"

  - type: input
    id: fhi_number
    attributes:
      label: FHI Cotton TCX — Number
      placeholder: "e.g. 19-5232"

  - type: input
    id: marathon_number
    attributes:
      label: Marathon Rayon — Number
      placeholder: "e.g. 2460"

  - type: input
    id: robison_number
    attributes:
      label: Robison Anton Rayon — Number
      placeholder: "e.g. 2460"

  - type: input
    id: pantone_number
    attributes:
      label: Pantone Solid Coated — Number
      placeholder: "e.g. 3308 C"

  - type: textarea
    id: notes
    attributes:
      label: Notes / correction (optional)
      description: Anything we should know — e.g. "shade should be Red, not Purple" or "this match isn't right."
      placeholder: "e.g. Burgundy — shade should be Red, not Purple"

  - type: markdown
    attributes:
      value: |
        ---

  - type: input
    id: your_name
    attributes:
      label: Your name / initials
      placeholder: "e.g. Noelle, Jette"
    validations:
      required: true
