name: Suggest a Thread Color Match
description: Propose a new cross-brand thread color equivalency
title: "Suggest match: [COLOR NAME OR NUMBER]"
labels: ["suggestion"]
body:
  - type: markdown
    attributes:
      value: |
        Enter the **thread number** for each brand you know — leave the rest blank.
        Color names, hex codes, and the shade family are all filled in automatically
        from the thread color, so you only need the number(s).

  - type: dropdown
    id: shade
    attributes:
      label: Color Shade (family)
      description: Optional — leave blank and it's auto-assigned from the thread color. Only pick one if you want to override.
      options:
        - Black
        - Blue
        - Brown
        - Gold
        - Green
        - Grey
        - Navy
        - Orange
        - Pink
        - Purple
        - Red
        - Tan
        - White
        - Yellow

  - type: input
    id: polyneon_number
    attributes:
      label: Madeira Polyneon — Number
      placeholder: "e.g. 1704"

  - type: input
    id: classic_number
    attributes:
      label: Madeira Classic — Number
      placeholder: "e.g. 1390"

  - type: input
    id: fhi_number
    attributes:
      label: FHI Cotton TCX — Number
      placeholder: "e.g. 19-5232"

  - type: input
    id: marathon_number
    attributes:
      label: Marathon Rayon — Number
      placeholder: "e.g. 2460"

  - type: input
    id: robison_number
    attributes:
      label: Robison Anton Rayon — Number
      placeholder: "e.g. 2460"

  - type: input
    id: pantone_number
    attributes:
      label: Pantone Solid Coated — Number
      placeholder: "e.g. 3308 C"

  - type: markdown
    attributes:
      value: |
        ---

  - type: input
    id: your_name
    attributes:
      label: Your name / initials
      placeholder: "e.g. Noelle, Jette"
    validations:
      required: true
